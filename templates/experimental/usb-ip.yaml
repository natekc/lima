# A template to import USB devices from a USB/IP server on the host.
#
# Works with any USB/IP server that speaks the in-kernel USB/IP wire
# protocol on TCP/3240. Native hypervisor-level USB passthrough on
# macOS is tracked separately in lima-vm/lima#4766.
#
# Prerequisites on the host:
#   1. A USB/IP server is listening (default `host.lima.internal:3240`).
#   2. The devices you want to import are bound / captured by that
#      server (each server has its own command for this).
#
# Prerequisite in the guest:
#   * The `usbip` userspace tool must be installed. We install it via
#     `provision:` below rather than at boot to keep boot deterministic
#     and avoid surprise network installs on every cold start.
#
# At boot the cidata `45-setup-usbip.sh` script loads `vhci_hcd`,
# then a guestagent reconciler polls the USB/IP server every few
# seconds and runs `usbip attach`/`usbip detach` to converge.
# Errors (server unreachable, configured device not exported) are
# logged at warn level and throttled to one line per minute, so a
# misconfigured server does not flood the journal.

minimumLimaVersion: 2.0.0

base:
- template:_images/ubuntu-lts
- template:_default/mounts

provision:
- mode: system
  script: |
    #!/bin/sh
    set -eu
    if ! command -v usbip >/dev/null 2>&1; then
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y --no-install-recommends usbip
    fi

usb:
  # USB/IP-based passthrough (network transport). Sibling sub-blocks
  # under `usb:` are reserved for future hypervisor-level USB
  # passthrough (see lima-vm/lima#4766).
  ip:
    # Default USB/IP server (host[:port]). Optional; this is the default
    # value applied when no server is specified.
    server: host.lima.internal:3240
    devices:
    # --- Static busid mode ---
    # Replace `1-2` with the busid reported by your USB/IP server
    # (consult its documentation for the listing command).
    - busid: 1-2

    # --- Auto-attach by VID:PID (hotplug) ---
    # When vendorID + productID are set instead of `busid`, the
    # guestagent polls the USB/IP server every few seconds and
    # attaches the device whenever it appears on the server
    # (including after unplug/replug). Works with any USB/IP server
    # that speaks the kernel protocol -- no event socket required.
    # - vendorID: "1050"     # 4-digit lowercase hex
    #   productID: "0407"

    # Per-device server overrides are allowed in either mode:
    # - busid: 4-1
    #   server: some-other-host:3240

# After `limactl start`, verify with:
#   limactl shell default -- lsusb
#   limactl shell default -- sudo dmesg | tail
#
# ---------------------------------------------------------------------
# Reproducing without a real USB device (synthetic server)
# ---------------------------------------------------------------------
#
# You can verify the guest-side reconciler end-to-end without owning
# the device, without root, and without installing a real USB/IP
# daemon, by running a ~200-line mock server on the host that speaks
# just enough of the USB/IP wire protocol for `usbip attach` to
# return success. This is how we test this template in CI-style
# environments.
#
#   1. Run the in-repo mock server (see hack/usbip-mockd/main.go)
#      on the host:
#
#        go run ./hack/usbip-mockd --listen 0.0.0.0:3240
#
#      It advertises one synthetic device:
#        busid = 1-1   vendorID = 0525   productID = a4a0
#
#   2. Configure this template's `usb.ip.devices` to match the
#      synthetic device, e.g.:
#
#        usb:
#          ip:
#            server: host.lima.internal:3240
#            devices:
#            - vendorID: "0525"
#              productID: "a4a0"
#
#   3. `limactl start ./usb-ip.yaml` and watch both sides:
#
#      host (mockd) should log, every reconcile interval:
#        OP_REQ_DEVLIST   ... <-- reconciler polling
#        OP_REQ_IMPORT busid="1-1"
#        IMPORT accepted; entering URB phase (no responses)
#
#      guest (lima-guestagent) should log:
#        usbip reconcile: attached 1-1 @ host.lima.internal:3240
#
# Notes / caveats:
#   * The mock does not service URB traffic after IMPORT, so the
#     kernel's vhci_hcd tears the attachment down a few seconds
#     after each attach. The reconciler immediately re-attaches on
#     the next poll. This is expected -- the test exercises the
#     attach control path, not actual USB data transfer.
#   * Therefore `lsusb` inside the guest will NOT show the
#     synthetic device; `journalctl -u lima-guestagent` is the
#     authoritative signal. To exercise data transfer too you need
#     a real USB/IP server (e.g. usbipd-darwin, usbipd-mac, or
#     Linux `usbipd`) with a real device bound.
